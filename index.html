<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOGDANEWS — ГЛАВНЫЕ СОБЫТИЯ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: #ffffff;
            --text-dark: #1a1a1a;
            --accent-red: #c00;
            --border-gray: #e2e2e2;
            --secondary-text: #666;
        }

        body {
            background-color: var(--main-bg);
            color: var(--text-dark);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        header {
            border-bottom: 4px double var(--text-dark);
            margin: 0 auto;
            max-width: 1200px;
            padding: 20px 0;
            text-align: center;
        }

        .site-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .sub-header {
            border-top: 1px solid var(--border-gray);
            border-bottom: 1px solid var(--border-gray);
            margin-top: 10px;
            padding: 5px 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        /* СЕТКА НОВОСТЕЙ */
        main {
            max-width: 1200px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            padding: 0 20px;
        }

        #featured-news {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .news-article {
            border-bottom: 1px solid var(--border-gray);
            padding-bottom: 25px;
        }

        .news-article:last-child {
            border-bottom: none;
        }

        .category {
            color: var(--accent-red);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            margin-bottom: 8px;
            display: block;
        }

        .news-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            line-height: 1.2;
            margin: 0 0 15px 0;
            cursor: pointer;
        }

        .news-meta {
            font-size: 0.85rem;
            color: var(--secondary-text);
            margin-bottom: 15px;
        }

        .news-content {
            line-height: 1.6;
            color: #333;
            font-size: 1.05rem;
        }

        .news-image-container {
            margin-top: 15px;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
        }

        .news-image {
            max-width: 100%;
            height: auto;
            border: 1px solid var(--border-gray);
        }

        /* БОКОВАЯ ПАНЕЛЬ */
        aside {
            border-left: 1px solid var(--border-gray);
            padding-left: 20px;
        }

        .sidebar-title {
            font-family: 'Playfair Display', serif;
            border-bottom: 2px solid var(--text-dark);
            padding-bottom: 5px;
            margin-bottom: 20px;
        }

        footer {
            background: #f9f9f9;
            border-top: 1px solid var(--border-gray);
            padding: 40px 0;
            text-align: center;
            font-size: 0.8rem;
            color: var(--secondary-text);
            margin-top: 50px;
        }

        @media (max-width: 768px) {
            main { grid-template-columns: 1fr; }
            aside { border-left: none; padding-left: 0; }
            .site-title { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="site-title">BOGDAN TIMES</div>
        <div class="sub-header">
            <span>ВТОРНИК, 13 МАЯ, 2026</span>
            <span>WORLD EDITION</span>
            <span>VOL. I ... NO. 001</span>
        </div>
    </header>

    <main>
        <section id="news-container">
            <!-- СЮДА ПРИДУТ НОВОСТИ -->
        </section>

        <aside>
            <h3 class="sidebar-title">ПОСЛЕДНИЕ СВОДКИ</h3>
            <div id="sidebar-content">
                <p style="font-size: 0.9rem;">СИСТЕМА РАБОТАЕТ В ШТАТНОМ РЕЖИМЕ. ВСЕ ДАННЫЕ ВЕРИФИЦИРОВАНЫ.</p>
            </div>
        </aside>
    </main>

    <footer>
        <p>© 2026 BOGDAN MEDIA GROUP. ВСЕ ПРАВА ЗАЩИЩЕНЫ. ИСПОЛЬЗОВАНИЕ МАТЕРИАЛОВ ТОЛЬКО С РАЗРЕШЕНИЯ АДМИНИСТРАЦИИ.</p>
    </footer>

    <script>
        async function loadNews() {
            try {
                const response = await fetch('news.json');
                const news = await response.json();
                const container = document.getElementById('news-container');

                news.reverse().forEach((item, index) => {
                    const article = document.createElement('article');
                    article.className = 'news-article';

                    let imageHtml = item.image ? 
                        `<div class="news-image-container"><img src="${item.image}" class="news-image" alt="media"></div>` : '';

                    article.innerHTML = `
                        <span class="category">${index === 0 ? 'ГЛАВНОЕ' : 'НОВОСТИ'}</span>
                        <h2 class="news-title">${item.title}</h2>
                        <div class="news-meta">ОПУБЛИКОВАНО: ${item.date} // АВТОР: MISTER POINT</div>
                        <div class="news-content">${item.content}</div>
                        ${imageHtml}
                    `;
                    container.appendChild(article);
                });
            } catch (error) {
                console.error("ОШИБКА ЗАГРУЗКИ НОВОСТЕЙ:", error);
            }
        }
        loadNews();
    </script>
</body>
</html>
