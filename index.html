<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOGDANEWS</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --main-bg: #f4f1ea; /* ЦВЕТ СТАРОЙ БУМАГИ */
            --text-dark: #1a1a1a; 
            --accent-red: #c00; 
            --border-gray: #333; 
            --secondary-text: #444; 
        }
        
        body { 
            background-color: var(--main-bg); 
            color: var(--text-dark); 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            padding: 0; 
            line-height: 1.4;
        }

        /* УЛУЧШЕННЫЙ ХЕДЕР */
        header { 
            border-bottom: 5px double var(--text-dark); 
            margin: 0 auto; 
            max-width: 1200px; 
            padding: 30px 0; 
            text-align: center; 
        }
        
        .site-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 4.5rem; 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: -2px; 
            line-height: 0.9;
        }

        .sub-header { 
            border-top: 2px solid var(--text-dark); 
            border-bottom: 2px solid var(--text-dark); 
            margin-top: 15px; 
            padding: 8px 0; 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            font-weight: 700; 
            display: flex; 
            justify-content: space-between; 
        }

        main { 
            max-width: 1200px; 
            margin: 30px auto; 
            display: grid; 
            grid-template-columns: 3fr 1fr; 
            gap: 50px; 
            padding: 0 20px; 
        }

        /* КОНТЕНТ НОВОСТЕЙ */
        .news-article { 
            border-bottom: 1px solid #ccc; 
            padding-bottom: 30px; 
            margin-bottom: 30px; 
        }
        
        .category { 
            background: var(--text-dark);
            color: #fff;
            padding: 2px 8px;
            text-transform: uppercase; 
            font-size: 0.7rem; 
            margin-bottom: 10px; 
            display: inline-block; 
        }
        
        .news-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.5rem; 
            line-height: 1.1; 
            margin: 10px 0; 
            font-weight: 700;
        }

        .news-content { 
            column-count: 2; /* ГАЗЕТНЫЕ КОЛОНКИ */
            column-gap: 20px;
            text-align: justify;
            font-size: 1rem;
            color: #222;
        }

        /* БИРЖА БОГДАНА */
        aside { 
            border-left: 2px solid var(--text-dark); 
            padding-left: 25px; 
        }

        .sidebar-box {
            background: #fff;
            border: 1px solid var(--text-dark);
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 5px 5px 0px var(--text-dark);
        }

        .sidebar-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.5rem;
            border-bottom: 3px solid var(--accent-red); 
            padding-bottom: 5px; 
            margin: 0 0 15px 0; 
            text-transform: uppercase;
        }

        .exchange-rate {
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-red);
            text-align: center;
            display: block;
            padding: 10px;
            border: 1px dashed #ccc;
        }

        .exchange-label {
            font-size: 0.8rem;
            color: var(--secondary-text);
            text-transform: uppercase;
            display: block;
            margin-top: 10px;
            text-align: center;
        }

        footer { 
            border-top: 1px solid var(--text-dark); 
            padding: 30px 0; 
            text-align: center; 
            font-size: 0.8rem; 
            margin-top: 50px; 
            text-transform: uppercase;
            font-weight: bold;
        }

        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
            aside { border-left: none; padding-left: 0; border-top: 2px solid var(--text-dark); padding-top: 20px; }
            .news-content { column-count: 1; }
        }
    </style>
</head>
<body>
    <header>
        <div class="site-title">BOGDANEWS</div>
        <div class="sub-header">
            <span id="live-date">...</span>
            <span>ECONOMY & CHAOS</span>
            <span>EST. 2026</span>
        </div>
    </header>
    
    <main>
        <section id="news-container">ЗАГРУЗКА ИМПЕРИИ...</section>
        
        <aside>
            <div class="sidebar-box">
                <h3 class="sidebar-title">БИРЖА BOGDAN</h3>
                <div class="exchange-rate" id="exchange-val">1 RUB = 0.00 USD</div>
                <span class="exchange-label">ГЛОБАЛЬНЫЙ ИНДЕКС ХАОСА</span>
            </div>
            
            <div class="sidebar-box" style="font-size: 0.8rem;">
                <strong>РЕКЛАМА:</strong> КУПЛЮ ГЕЙММЕЙКЕР ЗА РУБЛИ. ДОРОГО. ОБРАЩАТЬСЯ К ХЗ.
            </div>
        </aside>
    </main>

    <footer>
        COPYRIGHT © 2026 BOGDAN CORP. ВСЕ ПРАВА ПРИНАДЛЕЖАТ МНЕ.
    </footer>

    <script>
        var SUPABASE_URL = 'https://lqnluvjvghxoiqknfixp.supabase.co';
        var SUPABASE_KEY = 'sb_publishable_ZKaIa2ygxMrvn6M8urGE1A_1M4PR3jQ';
        var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ОБНОВЛЕНИЕ БИРЖИ
        function updateExchange() {
            const val = (Math.random() * (1000 - 1) + 1).toFixed(2);
            document.getElementById('exchange-val').innerText = `1 РУБЛЬ = ${val} $`;
        }

        (function init() {
            var now = new Date();
            document.getElementById('live-date').innerText = now.toLocaleDateString('ru-RU').toUpperCase();
            
            async function getNews() {
                var { data, error } = await supabase.from('news').select('*').order('id', { ascending: false });
                var container = document.getElementById('news-container');
                if (error) { container.innerHTML = "БАЗА ДАННЫХ УШЛА НА ПЕРЕРЫВ: " + error.message; return; }
                
                container.innerHTML = data.map((n, i) => `
                    <article class="news-article">
                        <span class="category">${i === 0 ? 'ГЛАВНАЯ ТЕМА' : 'ИНСАЙД'}</span>
                        <h2 class="news-title">${n.title || 'БЕЗ НАЗВАНИЯ'}</h2>
                        <div class="news-meta">АРХИВ // 2026</div>
                        <div class="news-content">${n.content || 'КОНТЕНТ ЗАСЕКРЕЧЕН.'}</div>
                    </article>
                `).join('');
            }

            getNews();
            updateExchange();
            setInterval(updateExchange, 3000); // КУРС МЕНЯЕТСЯ КАЖДЫЕ 3 СЕКУНДЫ
        })();
    </script>
</body>
</html>
