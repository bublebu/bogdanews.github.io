<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOGDANEWS</title>
    
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #f4f1ea; --dark: #1a1a1a; --red: #d30000; }
        body { background: var(--bg); color: var(--dark); font-family: 'Georgia', serif; margin: 0; padding: 0; }
        
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.12; pointer-events: none; z-index: 10000;
        }

        .ticker-wrap { background: #000; color: #fff; padding: 5px 0; overflow: hidden; font-family: 'Roboto Mono'; font-size: 0.75rem; }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 30s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        header { border-bottom: 5px double #000; max-width: 1200px; margin: 0 auto; padding: 20px; text-align: center; }
        .site-title { font-family: 'Playfair Display', serif; font-size: 5rem; text-transform: uppercase; margin: 0; line-height: 0.8; }
        
        main { max-width: 1200px; margin: 20px auto; display: grid; grid-template-columns: 1fr 3fr 1.2fr; gap: 30px; padding: 0 20px; }
        
        .news-card { border-bottom: 1px solid #000; padding-bottom: 25px; margin-bottom: 30px; position: relative; }
        .btn-print { position: absolute; right: 0; top: 0; background: #000; color: #fff; border: none; font-size: 0.6rem; padding: 3px 7px; cursor: pointer; }

        .sidebar-box { background: #fff; border: 1px solid #000; padding: 15px; box-shadow: 4px 4px 0 #000; margin-bottom: 20px; }
        .input-style { width: 100%; border: 1px solid #000; padding: 8px; font-family: 'Roboto Mono'; margin-bottom: 8px; box-sizing: border-box; }
        
        .btn-main { width: 100%; padding: 12px; background: #000; color: #fff; border: none; font-family: 'Roboto Mono'; font-weight: bold; cursor: pointer; }
        .btn-main:disabled { background: #ccc !important; cursor: not-allowed; color: #666 !important; }
        .btn-main:hover:not(:disabled) { background: var(--red); }

        #gate { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:20000; display:none; justify-content:center; align-items:center; }

        @media print { .no-print { display: none !important; } }
        @media (max-width: 1000px) { main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="gate" class="no-print">
    <div style="background:#fff; padding:30px; border:4px solid #000; text-align:center; box-shadow: 10px 10px 0 var(--red);">
        <h2 style="font-family:'Playfair Display';">ДОСТУП ОГРАНИЧЕН</h2>
        <!-- Кнопка разблокируется через функцию verifyOk -->
        <div class="cf-turnstile" data-sitekey="0x4AAAAAADPQ_3U1o1hqP5Fj" data-callback="verifyOk"></div>
        <button class="btn-main" id="gate-btn" disabled style="margin-top:15px;">ПОДТВЕРДИТЬ И ВХОДИТЬ</button>
    </div>
</div>

<script>
    // ФУНКЦИЯ ДОЛЖНА БЫТЬ ВНЕ МОДУЛЯ ДЛЯ CLOUDFLARE
    window.verifyOk = function(token) {
        const btn = document.getElementById('gate-btn');
        if (btn) {
            btn.disabled = false;
            btn.style.background = "#d30000"; // Делаем красной для наглядности
        }
    };
</script>

<div class="ticker-wrap no-print">
    <div class="ticker">+++ BOGDANEWS v1.21.1 +++ СЕРВЕР SUPABASE ПОДКЛЮЧЕН +++ CLOUDFLARE TURNSTILE АКТИВЕН +++ ОЖИДАНИЕ НОВЫХ СТАТЕЙ +++</div>
</div>

<header>
    <div class="site-title">BogdaNews</div>
    <div style="font-family:'Roboto Mono'; border-top:1px solid #000; margin-top:10px; display:flex; justify-content:space-between; font-size:0.8rem; padding:5px 0;">
        <span id="date">...</span>
        <span>КРУТО</span>
        <span>FREE PRESS</span>
    </div>
</header>

<main>
    <aside class="no-print">
        <div class="sidebar-box">
            <h3 style="margin:0 0 10px 0; font-size:1rem;">СТАТУС</h3>
            <p id="user-status" style="font-size:0.7rem; color:var(--red);">ТРЕБУЕТСЯ АВТОРИЗАЦИЯ</p>
        </div>
    </aside>

    <section id="feed">
        <div style="text-align:center; font-family:'Roboto Mono';">ЗАГРУЗКА ЛЕНТЫ...</div>
    </section>

    <aside class="no-print">
        <div class="sidebar-box" id="auth-section">
            <button class="btn-main" id="login-btn">ВОЙТИ ЧЕРЕЗ GOOGLE</button>
        </div>
        
        <div class="sidebar-box" id="prop-section" style="display:none;">
            <h3 style="margin:0 0 10px 0;">ПРЕДЛОЖИТЬ</h3>
            <input type="text" id="p-title" class="input-style" placeholder="ЗАГОЛОВОК">
            <textarea id="p-text" class="input-style" style="height:100px;" placeholder="ТЕКСТ..."></textarea>
            <button class="btn-main" id="p-send">ОТПРАВИТЬ</button>
            <button class="btn-main" id="logout-btn" style="margin-top:10px; background:#666;">ВЫЙТИ</button>
        </div>
    </aside>
</main>

<script type="module">
    const S_URL = 'https://lqnluvjvghxoiqknfixp.supabase.co';
    const S_KEY = 'sb_publishable_ZKaIa2ygxMrvn6M8urGE1A_1M4PR3jQ';
    const sb = window.supabase.createClient(S_URL, S_KEY);

    // ЗАКРЫТИЕ МОДАЛКИ
    document.getElementById('gate-btn').onclick = () => {
        document.getElementById('gate').style.display = 'none';
    };

    // ВХОД
    async function startLogin() {
        const { error } = await sb.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: 'https://bublebu.github.io/bogdanews/' }
        });
        if (error) alert(error.message);
    }

    // НОВОСТИ С ДАТОЙ
    async function getNews() {
        const { data } = await sb.from('news').select('*').order('id', { ascending: false });
        const feed = document.getElementById('feed');
        if (!data) return;
        feed.innerHTML = data.map(n => {
            const newsDate = n.created_at ? new Date(n.created_at).toLocaleDateString('ru-RU') : 'БЕЗ ДАТЫ';
            return `
                <article class="news-card">
                    <button class="btn-print no-print" onclick="window.print()">ПЕЧАТЬ</button>
                    <div style="font-family:'Roboto Mono'; font-size:0.7rem; color:#666; margin-bottom:5px;">
                        ОПУБЛИКОВАНО: ${newsDate} | АРХИВ №${n.id}
                    </div>
                    <h2 style="font-family:'Playfair Display'; font-size:2.5rem; margin:0 0 10px 0;">${n.title}</h2>
                    <p style="line-height:1.6; font-size:1.1rem; margin-bottom:10px;">${n.content}</p>
                    <div style="font-family:'Roboto Mono'; font-size:0.7rem;">👍 ${n.likes || 0}</div>
                </article>
            `;
        }).join('');
    }

    document.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('date').innerText = new Date().toLocaleDateString('ru-RU').toUpperCase();
        document.getElementById('login-btn').onclick = startLogin;
        document.getElementById('logout-btn').onclick = () => { sb.auth.signOut(); location.reload(); };
        
        document.getElementById('p-send').onclick = async () => {
            const t = document.getElementById('p-title').value;
            const c = document.getElementById('p-text').value;
            const { data: { user } } = await sb.auth.getUser();
            const { error } = await sb.from('suggestions').insert([{ title: t, content: c, author_email: user.email }]);
            if (!error) { alert("ОТПРАВЛЕНО!"); document.getElementById('p-title').value = ''; document.getElementById('p-text').value = ''; }
        };

        const { data: { user } } = await sb.auth.getUser();
        if (user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('prop-section').style.display = 'block';
            document.getElementById('user-status').innerText = `АККАУНТ: ${user.email.split('@')[0].toUpperCase()}`;
            document.getElementById('user-status').style.color = "green";
        } else {
            setTimeout(() => { 
                const gate = document.getElementById('gate');
                if (gate) gate.style.display = 'flex'; 
            }, 1500);
        }
        getNews();
    });
</script>
</body>
</html>
