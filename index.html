<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOGDANEWS | АРХИВ</title>

    <meta name="google-site-verification" content="ii3A3TpdlwaiuA9tNgDsQ4Ld_0HsKZJVB_KH6YPKzIk" />
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Roboto+Mono:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --main-bg: #f9f7f2; 
            --text-dark: #121212; 
            --accent-red: #bc0000; 
            --border-thin: 1px solid rgba(0,0,0,0.15);
            --border-thick: 3px solid var(--text-dark);
        }
        
        body { background-color: var(--main-bg); color: var(--text-dark); font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        
        header { border-bottom: 1px solid var(--text-dark); margin: 0 auto; max-width: 1300px; padding: 40px 20px; text-align: center; }
        .site-title { font-family: 'Playfair Display', serif; font-size: 5.5rem; margin: 0; text-transform: uppercase; letter-spacing: -3px; font-weight: 900; }
        .sub-header { border-top: 1px solid var(--text-dark); border-bottom: 4px double var(--text-dark); margin-top: 10px; padding: 10px 0; font-size: 0.85rem; text-transform: uppercase; font-family: 'Roboto Mono', monospace; display: flex; justify-content: space-between; font-weight: bold; }

        main { max-width: 1300px; margin: 40px auto; display: grid; grid-template-columns: 1fr 3fr 1fr; gap: 40px; padding: 0 20px; }
        
        .article-meta { font-family: 'Roboto Mono', monospace; font-size: 0.75rem; color: #666; text-transform: uppercase; border-top: 1px solid #000; padding-top: 10px; }
        .pub-date { color: var(--accent-red); font-weight: bold; display: block; margin-bottom: 5px; }

        .news-article { margin-bottom: 60px; padding-bottom: 40px; border-bottom: var(--border-thin); }
        .category-tag { font-family: 'Roboto Mono', monospace; font-size: 0.7rem; font-weight: bold; text-decoration: underline; text-underline-offset: 4px; margin-bottom: 15px; display: block; }
        .news-title { font-family: 'Playfair Display', serif; font-size: 3rem; line-height: 1; margin: 10px 0 20px 0; font-weight: 700; letter-spacing: -1px; }
        .news-title:hover { color: var(--accent-red); cursor: pointer; }
        .news-content { font-size: 1.1rem; line-height: 1.6; text-align: justify; color: #333; }
        .news-content::first-letter { float: left; font-family: 'Playfair Display', serif; font-size: 4rem; line-height: 0.8; padding: 8px 8px 0 0; font-weight: 900; }

        .reactions { margin-top: 25px; display: flex; gap: 10px; }
        .react-btn { background: none; border: 1px solid #000; padding: 8px 15px; font-family: 'Roboto Mono', monospace; font-size: 0.8rem; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .react-btn:hover:not(:disabled) { background: var(--text-dark); color: #fff; }
        .react-btn:disabled { border-color: #ccc; color: #ccc; cursor: not-allowed; }

        aside { border-left: 1px solid #ccc; padding-left: 20px; }
        .sidebar-box { border-bottom: var(--border-thin); padding-bottom: 20px; margin-bottom: 30px; }
        .sidebar-title { font-family: 'Roboto Mono', monospace; font-size: 0.9rem; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; background: #000; color: #fff; display: inline-block; padding: 2px 8px; }
        
        .exchange-rate { font-family: 'Roboto Mono', monospace; font-size: 1.1rem; font-weight: bold; color: var(--accent-red); }
        
        .auth-card { background: #fff; border: 1px solid #000; padding: 15px; box-shadow: 8px 8px 0px #000; }
        .auth-btn { width: 100%; padding: 12px; font-family: 'Roboto Mono', monospace; font-weight: bold; border: 2px solid #000; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .login-btn { background: #000; color: #fff; }
        .login-btn:hover { background: var(--accent-red); border-color: var(--accent-red); }
        .logout-btn { background: #fff; color: var(--accent-red); border-color: var(--accent-red); }

        .prop-input { width: 100%; border: 1px solid #000; padding: 8px; font-family: 'Roboto Mono'; margin-bottom: 10px; box-sizing: border-box; }
        .prop-area { width: 100%; height: 100px; border: 1px solid #000; padding: 8px; font-family: 'Roboto Mono'; box-sizing: border-box; resize: none; }

        @media (max-width: 1000px) {
            main { grid-template-columns: 1fr; }
            .site-title { font-size: 3.5rem; }
            aside { border-left: none; border-top: var(--border-thick); padding-top: 30px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="site-title">BogdaNews</div>
        <div class="sub-header">
            <span id="live-date">...</span>
            <span>КРУТО</span>
            <span>ТОМ CXIII — № 42</span>
        </div>
    </header>
    
    <main>
        <section id="left-col" class="sidebar-box" style="border:none">
            <div class="sidebar-title">РЕДАКЦИЯ</div>
            <p style="font-size: 0.8rem; font-style: italic;">"ПРАВДА — ЭТО ТОЛЬКО ТО, ЧТО МЫ ПЕЧАТАЕМ. ОСТАЛЬНОЕ — ШУМ."</p>
        </section>

        <section id="news-container">
            <div id="loader" style="text-align: center; font-family: 'Roboto Mono';">ПОИСК НОВОСТЕЙ...</div>
        </section>
        
        <aside>
            <div class="sidebar-box">
                <div class="auth-card" id="auth-box">
                    <div id="unauth-view">
                        <button class="auth-btn login-btn" id="btn-login">РЕГИСТРАЦИЯ</button>
                    </div>
                    <div id="auth-view" style="display: none;">
                        <span style="font-family: 'Roboto Mono'; font-size: 0.7rem;">ДОСТУП РАЗРЕШЕН:</span><br>
                        <span id="user-email" style="font-weight: bold; font-family: 'Roboto Mono';"></span>
                        <button class="auth-btn logout-btn" id="btn-logout">ВЫХОД</button>
                    </div>
                </div>
            </div>

            <div class="sidebar-box" id="suggest-news-section">
                <div class="sidebar-title">ПРЕДЛОЖКА</div>
                <div id="suggest-form">
                    <input type="text" id="prop-title" class="prop-input" placeholder="ЗАГОЛОВОК">
                    <textarea id="prop-text" class="prop-area" placeholder="ЧТО СЛУЧИЛОСЬ?"></textarea>
                    <button class="auth-btn login-btn" onclick="window.sendToTelegram()" style="font-size: 0.7rem;">ОТПРАВИТЬ БОГДАНУ</button>
                </div>
            </div>

            <div class="sidebar-box">
                <div class="sidebar-title">КРАХ РЫНКА</div>
                <div class="exchange-rate" id="exchange-val">1 РУБ = 0.00 USD</div>
            </div>
            
            <div class="sidebar-box">
                <div class="sidebar-title">ПЕРСОНАЛ</div>
                <div style="font-size: 0.8rem; font-family: 'Roboto Mono';">
                    ГЛАВНЫЙ РЕДАКТОР: BOGDAN<br>
                    ТЕХОТДЕЛ: НИКТО
                </div>
            </div>
        </aside>
    </main>

    <script type="module">
        const S_URL = 'https://lqnluvjvghxoiqknfixp.supabase.co';
        const S_KEY = 'sb_publishable_ZKaIa2ygxMrvn6M8urGE1A_1M4PR3jQ';
        const sbClient = window.supabase.createClient(S_URL, S_KEY);

        let currentUser = null;

        window.sendToTelegram = async () => {
            if (!currentUser) {
                alert("КТО ВЫ? СНАЧАЛА АВТОРИЗУЙТЕСЬ.");
                return;
            }

            const title = document.getElementById('prop-title').value.trim();
            const text = document.getElementById('prop-text').value.trim();

            if (!title || !text) {
                alert("ЗАПОЛНИТЕ ВСЕ ПОЛЯ.");
                return;
            }

            try {
                const { error } = await sbClient
                    .from('suggestions')
                    .insert([{ 
                        title: title, 
                        content: text, 
                        author_email: currentUser.email 
                    }]);

                if (!error) {
                    alert("ПРИНЯТО! ПРОВЕРЯЙ ТЕЛЕГРАМ.");
                    document.getElementById('prop-title').value = '';
                    document.getElementById('prop-text').value = '';
                } else {
                    // Если триггер вернул NULL (из-за бана), это может вызвать ошибку
                    alert("ОШИБКА: ДОСТУП ОГРАНИЧЕН ИЛИ СБОЙ БАЗЫ.");
                }
            } catch (err) {
                alert("ОШИБКА ПОДКЛЮЧЕНИЯ.");
            }
        };

        window.signInWithGoogle = async () => {
            await sbClient.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + window.location.pathname }
            });
        };

        window.signOut = async () => {
            await sbClient.auth.signOut();
            location.reload();
        };

        window.handleReaction = async (id, field, current) => {
            if (!currentUser) { alert("НУЖНА РЕГИСТРАЦИЯ."); return; }
            const key = 'reacted_' + id;
            if (localStorage.getItem(key)) return;

            const { error } = await sbClient.from('news').update({ [field]: (Number(current) || 0) + 1 }).eq('id', id);
            if (!error) {
                localStorage.setItem(key, 'true');
                await loadNews(false); 
            }
        };

        async function checkUser() {
            const { data: { user } } = await sbClient.auth.getUser();
            currentUser = user;
            if (user) {
                document.getElementById('unauth-view').style.display = 'none';
                document.getElementById('auth-view').style.display = 'block';
                document.getElementById('user-email').innerText = user.email.split('@')[0].toUpperCase();
            }
        }

        async function loadNews(countView = true) {
            const { data, error } = await sbClient.from('news').select('*').order('id', { ascending: false });
            const container = document.getElementById('news-container');
            if (error) return;

            container.innerHTML = data.map((n, i) => `
                <article class="news-article">
                    <div class="article-meta">
                        <span class="pub-date">${new Date(n.created_at).toLocaleDateString()}</span>
                        <span>ГЛАЗ: ${n.views || 0}</span>
                    </div>
                    <span class="category-tag">${i === 0 ? 'СВЕЖАК' : 'АРХИВ'}</span>
                    <h2 class="news-title">${n.title}</h2>
                    <div class="news-content">${n.content}</div>
                    <div class="reactions">
                        <button class="react-btn" onclick="window.handleReaction(${n.id}, 'likes', ${n.likes})">👍 ${n.likes}</button>
                    </div>
                </article>
            `).join('');
        }

        document.getElementById('btn-login').onclick = window.signInWithGoogle;
        document.getElementById('btn-logout').onclick = window.signOut;
        document.getElementById('live-date').innerText = new Date().toLocaleDateString('ru-RU', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();

        async function init() {
            await checkUser();
            await loadNews();
            setInterval(() => {
                document.getElementById('exchange-val').innerText = `1 РУБ = ${(Math.random() * 99).toFixed(2)} USD`;
            }, 5000);
        }
        init();
    </script>
</body>
</html>
