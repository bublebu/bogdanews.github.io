<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOGDANEWS</title>

    <meta name="google-site-verification" content="ii3A3TpdlwaiuA9tNgDsQ4Ld_0HsKZJVB_KH6YPKzIk" />
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --main-bg: #f4f1ea; 
            --text-dark: #1a1a1a; 
            --accent-red: #c00; 
        }
        
        body { background-color: var(--main-bg); color: var(--text-dark); font-family: 'Roboto', sans-serif; margin: 0; padding: 0; line-height: 1.4; }
        header { border-bottom: 5px double var(--text-dark); margin: 0 auto; max-width: 1200px; padding: 30px 0; text-align: center; }
        .site-title { font-family: 'Playfair Display', serif; font-size: 4.5rem; margin: 0; text-transform: uppercase; letter-spacing: -2px; line-height: 0.9; }
        .sub-header { border-top: 2px solid var(--text-dark); border-bottom: 2px solid var(--text-dark); margin-top: 15px; padding: 8px 0; font-size: 0.9rem; text-transform: uppercase; font-weight: 700; display: flex; justify-content: space-between; }

        main { max-width: 1200px; margin: 30px auto; display: grid; grid-template-columns: 3fr 1fr; gap: 50px; padding: 0 20px; }
        .news-article { border-bottom: 1px solid #ccc; padding-bottom: 30px; margin-bottom: 30px; }
        .category { background: var(--text-dark); color: #fff; padding: 2px 8px; text-transform: uppercase; font-size: 0.7rem; margin-bottom: 10px; display: inline-block; }
        .news-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; line-height: 1.1; margin: 10px 0; font-weight: 700; }
        .news-content { column-count: 2; column-gap: 20px; text-align: justify; font-size: 1rem; color: #222; }

        .reactions { margin-top: 15px; display: flex; gap: 15px; align-items: center; }
        .react-btn { background: #fff; border: 1px solid var(--text-dark); cursor: pointer; padding: 5px 12px; font-weight: bold; font-family: 'Roboto', sans-serif; transition: 0.2s; }
        .react-btn:hover:not(:disabled) { background: var(--text-dark); color: #fff; }
        .react-btn:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
        .stat-view { font-size: 0.9rem; color: #666; font-weight: bold; }

        aside { border-left: 2px solid var(--text-dark); padding-left: 25px; }
        .sidebar-box { background: #fff; border: 1px solid var(--text-dark); padding: 15px; margin-bottom: 20px; box-shadow: 5px 5px 0px var(--text-dark); }
        .sidebar-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; border-bottom: 3px solid var(--accent-red); padding-bottom: 5px; margin: 0 0 15px 0; text-transform: uppercase; }
        .exchange-rate { font-family: monospace; font-size: 1.2rem; font-weight: bold; color: var(--accent-red); text-align: center; display: block; padding: 10px; border: 1px dashed #ccc; }
        
        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
            aside { border-left: none; padding-top: 20px; border-top: 2px solid var(--text-dark); }
            .news-content { column-count: 1; }
        }
    </style>
</head>
<body>
    <header>
        <div class="site-title">BOGDANEWS</div>
        <div class="sub-header">
            <span id="live-date">...</span>
            <span>ECONOMY & CHAOS</span>
            <span>EST. 2026</span>
        </div>
    </header>
    
    <main>
        <section id="news-container">ОЖИДАНИЕ СВОДКИ...</section>
        
        <aside>
            <div class="sidebar-box">
                <h3 class="sidebar-title">БИРЖА BOGDAN</h3>
                <div class="exchange-rate" id="exchange-val">1 RUB = 0.00 USD</div>
            </div>
            <div class="sidebar-box">
                <h3 class="sidebar-title">РЕДАКЦИЯ</h3>
                <div style="font-size: 0.8rem;">
                    <strong>ГЛАВНЫЙ:</strong> БОГДАН<br>
                    <strong>ТЕХПОДДЕРЖКА:</strong> АРТЕМА НЕТ
                </div>
            </div>
        </aside>
    </main>

    <script>
        var S_URL = 'https://lqnluvjvghxoiqknfixp.supabase.co';
        var S_KEY = 'sb_publishable_ZKaIa2ygxMrvn6M8urGE1A_1M4PR3jQ';
        
        if (typeof sbClient === 'undefined') {
            var sbClient = window.supabase.createClient(S_URL, S_KEY);
        }

        async function handleReaction(id, field, current) {
            const key = 'reacted_' + field + '_' + id;
            if (localStorage.getItem(key)) return; // Блокируем на уровне кода

            const { error } = await sbClient.from('news').update({ [field]: (Number(current) || 0) + 1 }).eq('id', id);
            if (!error) {
                localStorage.setItem(key, 'true');
                loadNews(false); 
            }
        }

        async function loadNews(countView = true) {
            const { data, error } = await sbClient.from('news').select('*').order('id', { ascending: false });
            const container = document.getElementById('news-container');
            if (error) return;

            container.innerHTML = data.map((n, i) => {
                const liked = localStorage.getItem('reacted_likes_' + n.id);
                const disliked = localStorage.getItem('reacted_dislikes_' + n.id);
                
                return `
                <article class="news-article">
                    <span class="category">${i === 0 ? 'ГЛАВНАЯ ТЕМА' : 'ИНСАЙД'}</span>
                    <h2 class="news-title">${n.title || 'БЕЗ НАЗВАНИЯ'}</h2>
                    <div class="news-content">${n.content || '...'}</div>
                    <div class="reactions">
                        <span class="stat-view">👁 ${n.views || 0}</span>
                        <button class="react-btn" ${liked ? 'disabled' : ''} onclick="handleReaction(${n.id}, 'likes', ${n.likes || 0})">👍 ${n.likes || 0}</button>
                        <button class="react-btn" ${disliked ? 'disabled' : ''} onclick="handleReaction(${n.id}, 'dislikes', ${n.dislikes || 0})">👎 ${n.dislikes || 0}</button>
                    </div>
                </article>
            `}).join('');

            if (countView) {
                let updatedAny = false;
                for (const n of data) {
                    const key = 'v_' + n.id;
                    if (!sessionStorage.getItem(key)) {
                        await sbClient.from('news').update({ views: (Number(n.views) || 0) + 1 }).eq('id', n.id);
                        sessionStorage.setItem(key, 'true');
                        updatedAny = true;
                    }
                }
                if (updatedAny) loadNews(false);
            }
        }

        function updateRates() {
            document.getElementById('exchange-val').innerText = `1 РУБЛЬ = ${(Math.random() * 800).toFixed(2)} $`;
        }

        document.getElementById('live-date').innerText = new Date().toLocaleDateString('ru-RU').toUpperCase();
        loadNews();
        updateRates();
        setInterval(updateRates, 4000);
    </script>
</body>
</html>
