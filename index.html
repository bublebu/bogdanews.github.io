<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE NEWS FEED</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; max-width: 800px; margin: 0 auto; padding: 20px; background: #0a0a0a; color: #00ff00; }
        h1 { border-bottom: 2px solid #00ff00; padding-bottom: 10px; }
        .post { background: #111; border: 1px solid #333; margin-bottom: 20px; padding: 15px; }
        .post-date { color: #555; font-size: 0.9em; margin-bottom: 10px; }
        .post-title { font-size: 1.5em; font-weight: bold; margin-bottom: 10px; color: #fff; }
        .post-content { line-height: 1.6; color: #ccc; }
        .post-image { max-width: 100%; height: auto; margin-top: 15px; border: 1px solid #444; }
    </style>
</head>
<body>
    <h1>СИСТЕМА ОПОВЕЩЕНИЯ</h1>
    <div id="news-container">ЗАГРУЗКА ДАННЫХ...</div>

    <script>
        fetch('news.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('news-container');
                container.innerHTML = '';
                // СОРТИРОВКА НОВОСТЕЙ (НОВЫЕ СВЕРХУ)
                data.reverse().forEach(post => {
                    let html = `<div class="post">
                                    <div class="post-date">[ ${post.date} ]</div>
                                    <div class="post-title">${post.title}</div>
                                    <div class="post-content">${post.content}</div>`;
                    if (post.image) {
                        html += `<img src="img/${post.image}" class="post-image" alt="Прикрепленное изображение">`;
                    }
                    html += `</div>`;
                    container.innerHTML += html;
                });
            })
            .catch(error => {
                document.getElementById('news-container').innerHTML = 'ОШИБКА ДОСТУПА К БАЗЕ ДАННЫХ.';
                console.error(error);
            });
    </script>
</body>
</html>
