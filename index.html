<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOGDANEWS</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: #ffffff;
            --text-dark: #1a1a1a;
            --accent-red: #c00;
            --border-gray: #e2e2e2;
            --secondary-text: #666;
        }

        body { background-color: var(--main-bg); color: var(--text-dark); font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }

        header { border-bottom: 4px double var(--text-dark); margin: 0 auto; max-width: 1200px; padding: 20px 0; text-align: center; }
        .site-title { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin: 0; text-transform: uppercase; letter-spacing: -1px; }
        .sub-header { border-top: 1px solid var(--border-gray); border-bottom: 1px solid var(--border-gray); margin-top: 10px; padding: 5px 0; font-size: 0.8rem; text-transform: uppercase; font-weight: bold; display: flex; justify-content: space-between; }

        main { max-width: 1200px; margin: 30px auto; display: grid; grid-template-columns: 2fr 1fr; gap: 40px; padding: 0 20px; }
        
        .news-article { border-bottom: 1px solid var(--border-gray); padding-bottom: 25px; margin-bottom: 25px; }
        .category { color: var(--accent-red); font-weight: bold; text-transform: uppercase; font-size: 0.75rem; margin-bottom: 8px; display: block; }
        .news-title { font-family: 'Playfair Display', serif; font-size: 2rem; line-height: 1.2; margin: 0 0 15px 0; }
        .news-meta { font-size: 0.85rem; color: var(--secondary-text); margin-bottom: 15px; }
        .news-content { line-height: 1.6; color: #333; font-size: 1.05rem; white-space: pre-wrap; }

        aside { border-left: 1px solid var(--border-gray); padding-left: 20px; }
        .sidebar-title { font-family: 'Playfair Display', serif; border-bottom: 2px solid var(--text-dark); padding-bottom: 5px; margin-bottom: 20px; }

        /* КНОПКА ЗМЕЙКИ */
        .snake-btn {
            background: var(--text-dark);
            color: #fff;
            border: none;
            padding: 10px 15px;
            font-size: 0.7rem;
            text-transform: uppercase;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .snake-btn:hover { background: var(--accent-red); }

        /* ОКНО ИГРЫ (СКРЫТО ПО УМОЛЧАНИЮ) */
        #game-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        canvas { border: 2px solid #fff; background: #000; }
        .game-info { color: #fff; font-family: monospace; margin-bottom: 10px; }

        footer { background: #f9f9f9; border-top: 1px solid var(--border-gray); padding: 40px 0; text-align: center; font-size: 0.8rem; color: var(--secondary-text); margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <div class="site-title">BOGDANEWS</div>
        <div class="sub-header">
            <span id="live-date">ЗАГРУЗКА...</span>
            <span>WORLD EDITION</span>
            <span>VOL. I ... NO. 001</span>
        </div>
    </header>

    <main>
        <section id="news-container"></section>

        <aside>
            <h3 class="sidebar-title">ТЕХ. ОТДЕЛ</h3>
            <p style="font-size: 0.9rem; margin-bottom: 20px;">СИСТЕМА СТАТИСТИКИ И ОБНОВЛЕНИЙ.</p>
            <button class="snake-btn" onclick="startSnake()">ЗАПУСТИТЬ SNAKE_OS</button>
        </aside>
    </main>

    <!-- СЛОЙ ДЛЯ ИГРЫ -->
    <div id="game-overlay">
        <div class="game-info">УПРАВЛЕНИЕ: WASD | SCORE: <span id="score">0</span></div>
        <canvas id="snakeGame" width="400" height="400"></canvas>
        <button class="snake-btn" style="margin-top: 20px;" onclick="stopSnake()">ВЫХОД В ГАЗЕТУ</button>
    </div>

    <footer>
        <p>© 2026 BOGDAN MEDIA GROUP // MISTER POINT</p>
    </footer>

    <script>
        // 1. ЖИВАЯ ДАТА
        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('live-date').innerText = now.toLocaleDateString('ru-RU', options).toUpperCase();
        }
        updateDate();

        // 2. ЗАГРУЗКА НОВОСТЕЙ
        async function loadNews() {
            try {
                const response = await fetch('news.json');
                const news = await response.json();
                const container = document.getElementById('news-container');
                news.reverse().forEach((item, index) => {
                    const art = document.createElement('article');
                    art.className = 'news-article';
                    art.innerHTML = `
                        <span class="category">${index === 0 ? 'ГЛАВНОЕ' : 'СВОДКА'}</span>
                        <h2 class="news-title">${item.title}</h2>
                        <div class="news-meta">${item.date} // АВТОР: MISTER BOGDAN</div>
                        <div class="news-content">${item.content}</div>
                    `;
                    container.appendChild(art);
                });
            } catch (e) { console.error(e); }
        }
        loadNews();

        // 3. ЗМЕЙКА (60 FPS, WASD)
        const canvas = document.getElementById('snakeGame');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        
        let snake, food, dx, dy, score, gameRunning, lastTime;
        const box = 20;
        const fps = 60;
        const fpsInterval = 1000 / 10; // ТУТ 10 ТИКОВ В СЕКУНДУ ДЛЯ СКОРОСТИ, НО ЦИКЛ 60 FPS

        function startSnake() {
            document.getElementById('game-overlay').style.display = 'flex';
            snake = [{x: 10 * box, y: 10 * box}];
            food = {x: Math.floor(Math.random()*20)*box, y: Math.floor(Math.random()*20)*box};
            dx = box; dy = 0; score = 0;
            scoreEl.innerText = score;
            gameRunning = true;
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function stopSnake() {
            gameRunning = false;
            document.getElementById('game-overlay').style.display = 'none';
        }

        document.addEventListener('keydown', e => {
            if (!gameRunning) return;
            if (e.key === 'w' && dy === 0) { dx = 0; dy = -box; }
            if (e.key === 's' && dy === 0) { dx = 0; dy = box; }
            if (e.key === 'a' && dx === 0) { dx = -box; dy = 0; }
            if (e.key === 'd' && dx === 0) { dx = box; dy = 0; }
        });

        function gameLoop(currentTime) {
            if (!gameRunning) return;
            requestAnimationFrame(gameLoop);

            const elapsed = currentTime - lastTime;
            if (elapsed > 100) { // ОГРАНИЧЕНИЕ СКОРОСТИ ДВИЖЕНИЯ
                lastTime = currentTime - (elapsed % 100);
                
                const head = {x: snake[0].x + dx, y: snake[0].y + dy};
                
                // Столкновения
                if (head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400 || 
                    snake.some(s => s.x === head.x && s.y === head.y)) {
                    alert("GAME OVER! SCORE: " + score);
                    startSnake();
                    return;
                }

                snake.unshift(head);
                if (head.x === food.x && head.y === food.y) {
                    score++;
                    scoreEl.innerText = score;
                    food = {x: Math.floor(Math.random()*20)*box, y: Math.floor(Math.random()*20)*box};
                } else {
                    snake.pop();
                }

                ctx.fillStyle = 'black'; ctx.fillRect(0,0,400,400);
                ctx.fillStyle = 'red'; ctx.fillRect(food.x, food.y, box, box);
                ctx.fillStyle = 'lime';
                snake.forEach(s => ctx.fillRect(s.x, s.y, box-2, box-2));
            }
        }
    </script>
</body>
</html>
